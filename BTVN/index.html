<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox BTTH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



    <section class="projects">
        <div class="project-item">
            <div class="image-box">Ảnh Dự Án 1</div>
            <div class="desc-box">Mô tả Dự Án 1</div>
        </div>
        <div class="project-item reverse">
            <div class="image-box">Ảnh Dự Án 2</div>
            <div class="desc-box">Mô tả Dự Án 2</div>
        </div>
    </section>

    <section class="pricing-container">
        <div class="price-card">Basic</div>
        <div class="price-card highlight">Premium</div>
        <div class="price-card">Enterprise</div>
    </section>

    <section class="gallery">
        <div class="photo">Ảnh 1</div>
        <div class="photo">Ảnh 2</div>
        <div class="photo">Ảnh 3</div>
        <div class="photo">Ảnh 4</div>
        <div class="photo">Ảnh 5</div>
        <div class="photo">Ảnh 6</div>
    </section>

    <section class="booking-section">
        <div class="info-col">Thông tin phòng khám & Ưu đãi</div>
        <form class="form-col">Form Nhập Thông Tin</form>
    </section>

    <section class="members">
        <div class="member-card">Thành viên 1</div>
        <div class="member-card">Thành viên 2</div>
        <div class="member-card">Thành viên 3</div>
    </section>

</body>
    <footer class="footer">
        <div>© 2026 Luong Anh Minh</div>
        <div class="socials">
            <span>Facebook</span>
            <span>Github</span>
            <span>LinkedIn</span>
        </div>
    </footer>
</html>
